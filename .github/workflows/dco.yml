name: DCO

# Developer Certificate of Origin check: every commit in a pull request must
# carry a `Signed-off-by:` trailer (added by `git commit -s`). See
# https://developercertificate.org/. Lightweight shell check — no third-party action.

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on all PR commits
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          missing=0
          for sha in $(git rev-list "$base..$head"); do
            subject=$(git log -1 --format='%s' "$sha")
            author="$(git log -1 --format='%an <%ae>' "$sha")"
            if ! git log -1 --format='%B' "$sha" \
                 | grep -qiE "^Signed-off-by: .+ <.+@.+>"; then
              echo "::error::Commit $sha (\"$subject\") by $author is missing a Signed-off-by line."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "DCO check failed. Re-commit with 'git commit -s' (or amend with 'git commit --amend -s')."
            echo "See https://developercertificate.org/"
            exit 1
          fi
          echo "All PR commits carry a Signed-off-by trailer. DCO OK."
