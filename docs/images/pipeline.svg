<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 560" font-family="'Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e131a"/>
      <stop offset="1" stop-color="#0a0e13"/>
    </linearGradient>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6775"/>
    </marker>
    <marker id="arrowT" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#39c5bb"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1240" height="560" rx="20" fill="url(#card)" stroke="#1b2430" stroke-width="1.5"/>

  <!-- header -->
  <text x="40" y="50" fill="#f1f5f9" font-size="25" font-weight="600">How a tool call flows through Decision Core</text>
  <text x="40" y="78" fill="#7d8895" font-size="15">Deterministic by default — no LLM, no database, no network required.</text>

  <!-- surfaces -->
  <text x="930" y="44" fill="#5d6b7a" font-size="12.5" letter-spacing="1.5">ONE ENGINE, FOUR SURFACES</text>
  <g font-size="13.5" fill="#aeb9c5" text-anchor="middle">
    <rect x="930" y="56" width="64" height="28" rx="8" fill="#121821" stroke="#2b3543"/><text x="962" y="75">SDK</text>
    <rect x="1002" y="56" width="64" height="28" rx="8" fill="#121821" stroke="#2b3543"/><text x="1034" y="75">CLI</text>
    <rect x="1074" y="56" width="64" height="28" rx="8" fill="#121821" stroke="#2b3543"/><text x="1106" y="75">MCP</text>
    <rect x="1146" y="56" width="60" height="28" rx="8" fill="#121821" stroke="#2b3543"/><text x="1176" y="75">HTTP</text>
  </g>

  <!-- agent -->
  <rect x="40" y="180" width="158" height="150" rx="14" fill="#10161e" stroke="#2b3543" stroke-width="1.5"/>
  <text x="119" y="226" fill="#e8eef5" font-size="18" font-weight="600" text-anchor="middle">AI Agent</text>
  <text x="119" y="250" fill="#7d8895" font-size="13" text-anchor="middle">wants to run a tool</text>
  <rect x="60" y="270" width="118" height="34" rx="8" fill="#1a1410" stroke="#5a3a2a"/>
  <text x="119" y="292" fill="#f0a27a" font-size="13.5" font-family="Consolas,monospace" text-anchor="middle">delete_file()</text>
  <line x1="198" y1="255" x2="248" y2="255" stroke="#5b6775" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- runner -->
  <rect x="252" y="150" width="610" height="212" rx="16" fill="#0c1219" stroke="#26303d" stroke-width="1.5"/>
  <text x="272" y="180" fill="#39c5bb" font-size="13" letter-spacing="1" font-weight="600">DECISION RUNNER · evidence recorded at every step</text>

  <!-- 5 stages -->
  <g>
    <!-- stage template -->
    <g>
      <rect x="270" y="200" width="106" height="92" rx="11" fill="#121a23" stroke="#2c3a48"/>
      <text x="323" y="240" fill="#cdd8e3" font-size="13.5" text-anchor="middle" font-weight="600">Quality</text>
      <text x="323" y="258" fill="#cdd8e3" font-size="13.5" text-anchor="middle" font-weight="600">gate</text>
    </g>
    <line x1="378" y1="246" x2="392" y2="246" stroke="#5b6775" stroke-width="2" marker-end="url(#arrow)"/>
    <g>
      <rect x="394" y="200" width="106" height="92" rx="11" fill="#121a23" stroke="#3b8f5a"/>
      <text x="447" y="234" fill="#e8eef5" font-size="13.5" text-anchor="middle" font-weight="600">Policy</text>
      <text x="447" y="252" fill="#86d364" font-size="12.5" text-anchor="middle">deny-wins</text>
      <text x="447" y="270" fill="#7d8895" font-size="11.5" text-anchor="middle">PDP / PEP</text>
    </g>
    <line x1="502" y1="246" x2="516" y2="246" stroke="#5b6775" stroke-width="2" marker-end="url(#arrow)"/>
    <g>
      <rect x="518" y="200" width="106" height="92" rx="11" fill="#121a23" stroke="#2c3a48"/>
      <text x="571" y="240" fill="#cdd8e3" font-size="13.5" text-anchor="middle" font-weight="600">Trust</text>
      <text x="571" y="258" fill="#cdd8e3" font-size="13.5" text-anchor="middle" font-weight="600">routing</text>
    </g>
    <line x1="626" y1="246" x2="640" y2="246" stroke="#5b6775" stroke-width="2" marker-end="url(#arrow)"/>
    <g>
      <rect x="642" y="200" width="106" height="92" rx="11" fill="#121a23" stroke="#2c3a48"/>
      <text x="695" y="240" fill="#cdd8e3" font-size="13.5" text-anchor="middle" font-weight="600">Clause</text>
      <text x="695" y="258" fill="#cdd8e3" font-size="13.5" text-anchor="middle" font-weight="600">enforce</text>
    </g>
    <line x1="750" y1="246" x2="764" y2="246" stroke="#5b6775" stroke-width="2" marker-end="url(#arrow)"/>
    <g>
      <rect x="766" y="200" width="80" height="92" rx="11" fill="#121a23" stroke="#2c3a48"/>
      <text x="806" y="251" fill="#cdd8e3" font-size="13.5" text-anchor="middle" font-weight="600">Execute</text>
    </g>
  </g>
  <text x="272" y="332" fill="#6c7886" font-size="12.5">persistence:</text>
  <text x="350" y="332" fill="#9aa6b2" font-size="12.5">in-memory (default) · SQLite (optional)</text>

  <line x1="862" y1="220" x2="906" y2="220" stroke="#5b6775" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- verdicts -->
  <text x="930" y="170" fill="#5d6b7a" font-size="12.5" letter-spacing="1.2">VERDICT</text>
  <g font-size="15" font-weight="600">
    <rect x="930" y="182" width="276" height="44" rx="10" fill="#0f1a12" stroke="#2f6b3c"/>
    <rect x="930" y="182" width="6" height="44" rx="3" fill="#56d364"/>
    <text x="952" y="210" fill="#86d364" font-family="Consolas,monospace">allow</text>
    <text x="1196" y="210" fill="#5d6b7a" font-size="12" text-anchor="end" font-weight="400">action proceeds</text>

    <rect x="930" y="234" width="276" height="44" rx="10" fill="#1b160c" stroke="#7a5a1f"/>
    <rect x="930" y="234" width="6" height="44" rx="3" fill="#e3b341"/>
    <text x="952" y="262" fill="#e3b341" font-family="Consolas,monospace">approve_required</text>
    <text x="1196" y="262" fill="#5d6b7a" font-size="12" text-anchor="end" font-weight="400">human review</text>

    <rect x="930" y="286" width="276" height="44" rx="10" fill="#1c1010" stroke="#7a2f2c"/>
    <rect x="930" y="286" width="6" height="44" rx="3" fill="#f85149"/>
    <text x="952" y="314" fill="#f85149" font-family="Consolas,monospace">deny</text>
    <text x="1196" y="314" fill="#5d6b7a" font-size="12" text-anchor="end" font-weight="400">blocked</text>
  </g>

  <!-- evidence chain (real operation types from a captured blocked run, 4 records) -->
  <text x="40" y="424" fill="#5d6b7a" font-size="12.5" letter-spacing="1.2">TAMPER-EVIDENT EVIDENCE CHAIN</text>
  <g font-family="Consolas,monospace">
    <rect x="40"  y="438" width="156" height="58" rx="10" fill="#0f151c" stroke="#2b3543"/>
    <text x="118" y="465" fill="#9aa6b2" font-size="11.5" text-anchor="middle">decision_initiated</text>
    <text x="118" y="483" fill="#5d6b7a" font-size="11" text-anchor="middle">seq 0</text>
    <line x1="196" y1="467" x2="212" y2="467" stroke="#39c5bb" stroke-width="2" marker-end="url(#arrowT)"/>

    <rect x="212" y="438" width="156" height="58" rx="10" fill="#0f151c" stroke="#2b3543"/>
    <text x="290" y="465" fill="#9aa6b2" font-size="11.5" text-anchor="middle">quality_gate_checked</text>
    <text x="290" y="483" fill="#5d6b7a" font-size="11" text-anchor="middle">seq 1</text>
    <line x1="368" y1="467" x2="384" y2="467" stroke="#39c5bb" stroke-width="2" marker-end="url(#arrowT)"/>

    <rect x="384" y="438" width="156" height="58" rx="10" fill="#0f151c" stroke="#2b3543"/>
    <text x="462" y="465" fill="#9aa6b2" font-size="11.5" text-anchor="middle">policy_evaluated</text>
    <text x="462" y="483" fill="#5d6b7a" font-size="11" text-anchor="middle">seq 2</text>
    <line x1="540" y1="467" x2="556" y2="467" stroke="#39c5bb" stroke-width="2" marker-end="url(#arrowT)"/>

    <rect x="556" y="438" width="156" height="58" rx="10" fill="#0f151c" stroke="#2b3543"/>
    <text x="634" y="465" fill="#9aa6b2" font-size="11.5" text-anchor="middle">decision_finalized</text>
    <text x="634" y="483" fill="#5d6b7a" font-size="11" text-anchor="middle">seq 3</text>
  </g>
  <text x="744" y="460" fill="#cdd8e3" font-size="13.5" font-weight="600">SHA-256 hash-linked</text>
  <text x="744" y="479" fill="#7d8895" font-size="12.5">head hash </text>
  <text x="816" y="479" fill="#58a6ff" font-size="12.5" font-family="Consolas,monospace">11e917d5…</text>
  <text x="888" y="479" fill="#7d8895" font-size="12.5">· change a record → verify() finds the break</text>

  <text x="40" y="534" fill="#56607080" font-size="11.5">Honest note: trust routing &amp; clause enforcement run when configured; the default path is the deterministic deny-wins policy engine + evidence chain.</text>
</svg>
