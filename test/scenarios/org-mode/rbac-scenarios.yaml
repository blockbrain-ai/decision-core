##
# RBAC Scenario Suite — Role-scoped policy evaluation through HTTP API.
#
# Every deny scenario has a paired allow for the same action with an
# authorised agent, proving the server differentiates by role rather
# than blanket-denying.
##

tags: [rbac, smoke]

scenarios:
  # =====================================================================
  # Finance: CFO (roles: finance, approver)
  # =====================================================================
  - name: "CFO finance report access — allow"
    tags: [smoke, release-blocking]
    releaseBlocking: true
    steps:
      - name: "CFO can read finance reports"
        agentId: cfo-agent
        method: POST
        path: /evaluate
        body:
          surfaceId: finance-reporting
          action: finance-report-read
        expect:
          status: 200
          verdict: allow

  - name: "Product agent finance report access — deny"
    tags: [smoke, release-blocking]
    releaseBlocking: true
    steps:
      - name: "Product agent is denied finance report read"
        agentId: product-agent
        method: POST
        path: /evaluate
        body:
          surfaceId: finance-reporting
          action: finance-report-read
        expect:
          status: 200
          verdict: deny

  - name: "CFO finance transfer — allow"
    steps:
      - name: "CFO can initiate a finance transfer"
        agentId: cfo-agent
        method: POST
        path: /evaluate
        body:
          surfaceId: finance-operations
          action: finance-transfer
        expect:
          status: 200
          verdict: allow

  - name: "Product agent finance transfer — deny"
    steps:
      - name: "Product agent is denied finance transfer"
        agentId: product-agent
        method: POST
        path: /evaluate
        body:
          surfaceId: finance-operations
          action: finance-transfer
        expect:
          status: 200
          verdict: deny

  - name: "CFO finance summary — allow"
    steps:
      - name: "CFO can read finance summaries"
        agentId: cfo-agent
        method: POST
        path: /evaluate
        body:
          surfaceId: finance-reporting
          action: finance-summary-read
        expect:
          status: 200
          verdict: allow

  - name: "CFO budget update — allow"
    steps:
      - name: "CFO can update budgets"
        agentId: cfo-agent
        method: POST
        path: /evaluate
        body:
          surfaceId: finance-operations
          action: finance-budget-update
        expect:
          status: 200
          verdict: allow

  # =====================================================================
  # Finance Analyst (roles: finance_analyst) — limited access
  # =====================================================================
  - name: "Finance analyst report read — allow"
    steps:
      - name: "Finance analyst can read finance reports"
        agentId: finance-analyst-agent
