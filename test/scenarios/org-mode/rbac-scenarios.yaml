  - name: "Finance analyst summary read — allow"
    steps:
      - name: "Finance analyst can read finance summaries"
        agentId: finance-analyst-agent
        method: POST
        path: /evaluate
        body:
          surfaceId: finance-reporting
          action: finance-summary-read
        expect:
          status: 200
          verdict: allow

  - name: "Finance analyst transfer — deny"
    steps:
      - name: "Finance analyst is denied finance transfer (requires finance, not finance_analyst)"
        agentId: finance-analyst-agent
        method: POST
        path: /evaluate
        body:
          surfaceId: finance-operations
          action: finance-transfer
        expect:
          status: 200
          verdict: deny

  - name: "Finance analyst budget update — deny"
    steps:
      - name: "Finance analyst is denied budget update (requires finance, not finance_analyst)"
        agentId: finance-analyst-agent
        method: POST
        path: /evaluate
        body:
          surfaceId: finance-operations
          action: finance-budget-update
        expect:
          status: 200
          verdict: deny

